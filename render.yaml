services:
  - type: web
    name: hireflow
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # You'll set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false  # You'll set this manually in the Render dashboard
